<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Todo List</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    width:350px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input{
    width:70%;
    padding:8px;
}

button{
    padding:8px 12px;
    border:none;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#eee;
    margin-top:10px;
    padding:8px;
    display:flex;
    justify-content:space-between;
    border-radius:5px;
}

.delete{
    background:red;
    color:white;
    border:none;
    padding:4px 8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Todo List</h2>

<input id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>
</div>

<script>
function addTask(){
    let input = document.getElementById("taskInput");
    let task = input.value;

    if(task === "") return;

    let li = document.createElement("li");
    li.innerHTML = task + 
        ' <button class="delete" onclick="this.parentElement.remove()">X</button>';

    document.getElementById("taskList").appendChild(li);

    input.value="";
}
</script>

</body>
</html>
